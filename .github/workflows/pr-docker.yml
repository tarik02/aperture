name: pr docker

on:
  pull_request:
    branches:
      - master
    types:
      - labeled

permissions:
  contents: read
  packages: write

concurrency:
  group: pr-docker-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.arch }} image
    if: github.event.label.name == 'build-docker'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: cachix/install-nix-action@v31.10.7

      - uses: docker/login-action@v4.1.0
        if: github.event.pull_request.head.repo.full_name == github.repository
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          short_sha="${SHA::12}"
          printf '0.0.0-pr.%s.%s' "$PR_NUMBER" "$short_sha" > .aperture-deploy-version
          nix build path:.#aperture-docker --print-build-logs
          cp --dereference result "aperture-pr-${PR_NUMBER}-${{ matrix.arch }}.tar.gz"

      - name: Push architecture image
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE: ghcr.io/${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          short_sha="${SHA::12}"
          version="0.0.0-pr.${PR_NUMBER}.${short_sha}"
          tag="pr-${PR_NUMBER}-${short_sha}"
          docker load < result
          docker tag "aperture:$version" "$IMAGE:$tag-$ARCH"
          docker push "$IMAGE:$tag-$ARCH"

      - name: Upload image
        uses: actions/upload-artifact@v7.0.1
        with:
          name: aperture-pr-docker-${{ matrix.arch }}
          path: aperture-pr-${{ github.event.pull_request.number }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    name: publish image and comment
    needs: build
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-architecture image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          short_sha="${SHA::12}"
          tag="pr-${PR_NUMBER}-${short_sha}"
          docker buildx imagetools create \
            --tag "$IMAGE:$tag" \
            --tag "$IMAGE:pr-$PR_NUMBER" \
            "$IMAGE:$tag-amd64" \
            "$IMAGE:$tag-arm64"
          docker buildx imagetools inspect "$IMAGE:$tag"

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Prepare build links
        id: comment
        uses: actions/github-script@v9.0.0
        with:
          result-encoding: string
          script: |
            const { owner, repo } = context.repo
            const pullNumber = context.payload.pull_request.number
            const shortSha = context.payload.pull_request.head.sha.slice(0, 12)
            const image = `ghcr.io/${owner}/${repo}`
            const tag = `pr-${pullNumber}-${shortSha}`
            const artifacts = await github.paginate(
              github.rest.actions.listWorkflowRunArtifacts,
              { owner, repo, run_id: context.runId, per_page: 100 },
            )
            const artifactLines = artifacts
              .filter((artifact) => artifact.name.startsWith('aperture-pr-docker-'))
              .sort((left, right) => left.name.localeCompare(right.name))
              .map((artifact) => {
                const url = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}/artifacts/${artifact.id}`
                return `- [${artifact.name}](${url})`
              })

            return [
              `Docker images for ${context.payload.pull_request.head.sha}:`,
              '',
              ...artifactLines,
              `- \`${image}:${tag}\``,
              `- \`${image}:pr-${pullNumber}\``,
            ].join('\n')

      - name: Comment build links
        uses: marocchino/sticky-pull-request-comment@v3.0.5
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: aperture-pr-docker
          message: ${{ steps.comment.outputs.result }}
          skip_unchanged: true

  cleanup:
    name: remove build label
    needs:
      - build
      - publish
    if: >-
      always() &&
      github.event.label.name == 'build-docker' &&
      github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/remove-build-label.yml
    with:
      app-id: ${{ vars.APP_ID }}
      label: build-docker
      pull-request-number: ${{ github.event.pull_request.number }}
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
