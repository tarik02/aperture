name: docker image

on:
  workflow_call:
    inputs:
      version:
        description: Version embedded into the image
        required: true
        type: string
      ref:
        description: Git ref to build
        required: true
        type: string
      tags:
        description: Newline-separated GHCR tags
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - uses: cachix/install-nix-action@v31.10.7

      - uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        env:
          VERSION: ${{ inputs.version }}
        run: |
          printf '%s' "$VERSION" > .aperture-deploy-version
          nix build path:.#aperture-docker --print-build-logs

      - name: Push architecture image
        env:
          ARCH: ${{ matrix.arch }}
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION: ${{ inputs.version }}
        run: |
          docker load < result
          docker tag "aperture:$VERSION" "$IMAGE:$VERSION-$ARCH"
          docker push "$IMAGE:$VERSION-$ARCH"

  manifest:
    name: publish manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish multi-architecture image
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          TAGS: ${{ inputs.tags }}
          VERSION: ${{ inputs.version }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            if [[ -n "$tag" ]]; then
              tag_args+=(--tag "$IMAGE:$tag")
            fi
          done <<< "$TAGS"

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "$IMAGE:$VERSION-amd64" \
            "$IMAGE:$VERSION-arm64"

          docker buildx imagetools inspect "$IMAGE:$(printf '%s\n' "$TAGS" | head -n 1)"
