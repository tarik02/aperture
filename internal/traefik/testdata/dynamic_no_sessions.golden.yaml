http:
  routers:
    aperture-api:
      rule: "PathPrefix(`/api/admin`) || PathPrefix(`/api/tenant`) || PathPrefix(`/api/snapshots`) || PathPrefix(`/api/sessions`) || Path(`/api/health`)"
      service: aperture-api
      priority: 1
      entryPoints:
        - web
  middlewares:
  services:
    aperture-api:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8080"
