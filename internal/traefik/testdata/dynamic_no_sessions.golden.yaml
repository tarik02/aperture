http:
  routers:
    aperture-api:
      rule: "PathPrefix(`/`) && !PathPrefix(`/internal`) && !PathPrefix(`/cdp`)"
      service: aperture-api
      priority: 1
      entryPoints:
        - web
  middlewares: {}
  services:
    aperture-api:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8080"
