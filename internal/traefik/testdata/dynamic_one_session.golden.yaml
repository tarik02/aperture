        - web
    aperture-cdp-discovery-018f1234000070008000000000000001:
      rule: "PathPrefix(`/sessions/018f1234-0000-7000-8000-000000000001/cdp/aps_`)"
      service: aperture-wrapper-018f1234000070008000000000000001
      middlewares:
        - aperture-cdp-forward-auth-018f1234000070008000000000000001
      priority: 110
      entryPoints:
        - web
    aperture-cdp-websocket-018f1234000070008000000000000001:
      rule: "PathRegexp(`^/sessions/018f1234-0000-7000-8000-000000000001/cdp/[^/]+/devtools/`)"
      service: aperture-cdp-018f1234000070008000000000000001
      middlewares:
        - aperture-cdp-forward-auth-018f1234000070008000000000000001
        - aperture-cdp-strip-018f1234000070008000000000000001
        - aperture-cdp-websocket-headers-018f1234000070008000000000000001
      priority: 120
      entryPoints:
        - web
    aperture-files-018f1234000070008000000000000001:
      rule: "Path(`/sessions/018f1234-0000-7000-8000-000000000001/files`) || PathPrefix(`/sessions/018f1234-0000-7000-8000-000000000001/files/`)"
      service: aperture-wrapper-018f1234000070008000000000000001
      middlewares:
        - aperture-live-session-forward-auth-018f1234000070008000000000000001-write
        - aperture-strip-session-018f1234000070008000000000000001-files
      priority: 100
      entryPoints:
        - web
    aperture-screencast-018f1234000070008000000000000001:
      rule: "PathPrefix(`/sessions/018f1234-0000-7000-8000-000000000001/screencast/`)"
      service: aperture-wrapper-018f1234000070008000000000000001
      middlewares:
        - aperture-live-session-forward-auth-018f1234000070008000000000000001-write
        - aperture-strip-session-018f1234000070008000000000000001-screencast
      priority: 100
      entryPoints:
        - web
    aperture-uploads-018f1234000070008000000000000001:
      rule: "Path(`/sessions/018f1234-0000-7000-8000-000000000001/uploads`) || PathPrefix(`/sessions/018f1234-0000-7000-8000-000000000001/uploads/`)"
      service: aperture-wrapper-018f1234000070008000000000000001
      middlewares:
        - aperture-live-session-forward-auth-018f1234000070008000000000000001-write
        - aperture-strip-session-018f1234000070008000000000000001-uploads
      priority: 100
      entryPoints:
        - web
    aperture-webrtc-018f1234000070008000000000000001:
      rule: "PathPrefix(`/sessions/018f1234-0000-7000-8000-000000000001/webrtc/`)"
      service: aperture-wrapper-018f1234000070008000000000000001
      middlewares:
        - aperture-live-session-forward-auth-018f1234000070008000000000000001-write
        - aperture-strip-session-018f1234000070008000000000000001-webrtc
      priority: 100
      entryPoints:
        - web
  middlewares:
    aperture-cdp-forward-auth-018f1234000070008000000000000001:
      forwardAuth:
        address: "http://127.0.0.1:28080/internal/forward-auth/cdp/018f1234-0000-7000-8000-000000000001"
        authRequestHeaders:
          - X-Forwarded-Uri
    aperture-cdp-strip-018f1234000070008000000000000001:
      replacePathRegex:
        regex: "^/sessions/018f1234-0000-7000-8000-000000000001/cdp/[^/]+(?:/(.*))?$"
        replacement: "/$1"
    aperture-cdp-websocket-headers-018f1234000070008000000000000001:
      headers:
        customRequestHeaders:
          Authorization: ""
          Cookie: ""
          Sec-WebSocket-Protocol: ""
    aperture-live-session-forward-auth-018f1234000070008000000000000001-read:
      forwardAuth:
        address: "http://127.0.0.1:28080/internal/forward-auth/live-session/018f1234-0000-7000-8000-000000000001/read"
        authRequestHeaders:
          - Authorization
          - Sec-WebSocket-Protocol
          - X-Aperture-Tenant-Id
        authResponseHeaders:
          - Authorization
          - Sec-WebSocket-Protocol
          - X-Aperture-Actor-Kind
          - X-Aperture-Client-IP
    aperture-live-session-forward-auth-018f1234000070008000000000000001-write:
      forwardAuth:
        address: "http://127.0.0.1:28080/internal/forward-auth/live-session/018f1234-0000-7000-8000-000000000001/write"
