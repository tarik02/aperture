      service: aperture-wrapper-018f1234000070008000000000000001
      middlewares:
        - aperture-live-session-forward-auth-018f1234000070008000000000000001-read
        - aperture-replace-path-018f1234000070008000000000000001-browserstatus
      priority: 100
      entryPoints:
        - web
    aperture-browser-viewport-018f1234000070008000000000000001:
      rule: "Path(`/sessions/018f1234-0000-7000-8000-000000000001/browser/viewport`)"
      service: aperture-wrapper-018f1234000070008000000000000001
