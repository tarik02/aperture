    aperture-replace-path-018f1234000070008000000000000001-browserviewport:
      replacePath:
        path: "/viewport"
    aperture-strip-session-018f1234000070008000000000000001-files:
      stripPrefix:
        prefixes:
          - /sessions/018f1234-0000-7000-8000-000000000001
    aperture-strip-session-018f1234000070008000000000000001-screencast:
      stripPrefix:
        prefixes:
          - /sessions/018f1234-0000-7000-8000-000000000001
    aperture-strip-session-018f1234000070008000000000000001-uploads:
      stripPrefix:
        prefixes:
          - /sessions/018f1234-0000-7000-8000-000000000001
    aperture-strip-session-018f1234000070008000000000000001-webrtc:
      stripPrefix:
        prefixes:
          - /sessions/018f1234-0000-7000-8000-000000000001
  services:
    aperture-cdp-018f1234000070008000000000000001:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:9222"
        passHostHeader: false
    aperture-wrapper-018f1234000070008000000000000001:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:9333"
