packages:
  - web

onlyBuiltDependencies:
  - esbuild

catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vitest: 4.1.10
  vite-plus: 0.2.4

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
